name: RM GAG Healer — Self-Healing Repair Branches

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  issues:
    types: [labeled]

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

jobs:
  gag-heal:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.label.name, 'gag:'))

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install requests beautifulsoup4

      - name: Run GAG healing cycle
        id: gag-run
        run: |
          python3 -m rm_traffic.cicd_gag --run 2>&1 || true
          echo "GAG cycle complete"

      - name: Check for repair branches
        id: check-branches
        run: |
          BRANCHES=$(git branch -r --list "origin/gag/self-heal/*" 2>/dev/null | head -5)
          if [ -n "$BRANCHES" ]; then
            echo "has_branches=true" >> $GITHUB_OUTPUT
            echo "$BRANCHES"
          else
            echo "has_branches=false" >> $GITHUB_OUTPUT
            echo "No repair branches found"
          fi

      - name: Create PR for repair branch
        if: steps.check-branches.outputs.has_branches == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let branches;
            try {
              branches = execSync('git branch -r --list "origin/gag/self-heal/*"', { encoding: 'utf8' })
                .trim().split('\n').filter(b => b.trim());
            } catch (e) {
              branches = [];
            }

            for (const branch of branches) {
              const branchName = branch.trim().replace('origin/', '');
              console.log(`Creating PR for ${branchName}`);

              try {
                await github.rest.pulls.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[GAG] Self-healing PR — ${branchName}`,
                  head: branchName,
                  base: 'main',
                  body: `## CI/CD GAG Self-Healing PR\n\n**Branch**: ${branchName}\n\nThis PR was generated by the GAG healing engine. It contains a repair patch for a detected failure.\n\n### Requirements before merge\n- [ ] All CI tests pass\n- [ ] Policy gate passes\n- [ ] Human review and approval\n- [ ] No secrets or credentials modified\n\n**Auto-merge is disabled. Human approval required.**\n\n### Rollback plan\n\`git revert <merge_commit>\` within 24 hours if regression detected.`,
                });
              } catch (e) {
                console.log(`PR creation failed for ${branchName}: ${e.message}`);
              }
            }

      - name: Upload GAG artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rm-gag-healer-${{ github.run_id }}
          path: |
            rm_traffic/receipts/
            rm_traffic/last_failure.json
          retention-days: 30

      - name: Enforce no direct push to main
        run: |
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" = "main" ] || [ "$CURRENT_BRANCH" = "master" ]; then
            echo "::error::GAG attempted to push to main — BLOCKED"
            exit 1
          fi
          echo "GAG on branch: $CURRENT_BRANCH — OK"
