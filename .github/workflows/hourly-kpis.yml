name: ClientPulse OS — Hourly KPI Collection

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  collect-kpis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || true

      - name: Run KPI calculation
        run: python3 kpis.py

      - name: Commit receipts and decisions
        run: |
          git config user.name "ClientPulse OS"
          git config user.email "clientpulse@users.noreply.github.com"
          git add receipts/ content/decisions/ content/metrics/ 2>/dev/null || true
          git commit -m "hourly KPI receipt $(date -u +%Y%m%d_%H%M)" || echo "No changes to commit"
          git push || echo "Push failed — may need PAT"
