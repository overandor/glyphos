name: RM Revenue Control Plane

on:
  schedule:
    # Daily at 9:05 AM ET (13:05 UTC) — off-peak, not top-of-hour
    - cron: '5 13 * * *'
  push:
    branches: [main]
    paths:
      - 'traffic_overclock.py'
      - 'rm_traffic/overclock_ir.py'
      - 'rm_traffic/api_client.py'
      - '.github/workflows/overclock.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: true
        default: 'full'
        type: choice
        options:
          - observe
          - diagnose
          - experiment
          - full

jobs:
  revenue-control-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENTMASSEUR_USER: ${{ secrets.RENTMASSEUR_USER }}
      RENTMASSEUR_PASS: ${{ secrets.RENTMASSEUR_PASS }}
      RM_PHONE: ${{ secrets.RM_PHONE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests 2>/dev/null || true

      - name: Restore overclock DB cache
        uses: actions/cache@v4
        with:
          path: data/overclock/
          key: overclock-${{ github.run_id }}
          restore-keys: |
            overclock-

      - name: Run Revenue Control Plane
        id: pipeline
        run: |
          mkdir -p data/overclock/reports
          MODE="${{ github.event.inputs.mode || 'full' }}"

          case "$MODE" in
            observe)    python3 traffic_overclock.py --observe 2>&1 | tee pipeline_output.txt ;;
            diagnose)   python3 traffic_overclock.py --diagnose 2>&1 | tee pipeline_output.txt ;;
            experiment) python3 traffic_overclock.py --experiment 2>&1 | tee pipeline_output.txt ;;
            full)       python3 traffic_overclock.py --full 2>&1 | tee pipeline_output.txt ;;
          esac

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overclock-${{ github.run_number }}
          path: |
            data/overclock/
            pipeline_output.txt

      - name: Commit daily report
        if: success()
        run: |
          git config --global user.name "Revenue Control Plane"
          git config --global user.email "actions@github.com"
          git add data/overclock/reports/ 2>/dev/null || true
          git add data/overclock/overclock.db 2>/dev/null || true
          git commit -m "chore: daily revenue control plane report [skip ci]" 2>/dev/null || true
          git push 2>/dev/null || true

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('pipeline_output.txt', 'utf8'); } catch(e) {}
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 Revenue Control Plane Failure — ' + new Date().toISOString().split('T')[0],
              body: '## Pipeline Failed\n\n```\n' + output.substring(0, 3000) + '\n```\n\n[View run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')',
              labels: ['revenue-control-plane', 'automated']
            });
