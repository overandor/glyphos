name: RM Observe — Read-Only State Collection

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  observe:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install requests beautifulsoup4

      - name: Collect RM state (read-only)
        env:
          RENTMASSEUR_USER: ${{ secrets.RENTMASSEUR_USER }}
          RENTMASSEUR_PASS: ${{ secrets.RENTMASSEUR_PASS }}
          RM_PHONE: ${{ secrets.RM_PHONE }}
        run: |
          python3 -c "
          from rm_traffic.api_client import RentMasseurAPI
          from rm_traffic.state_engine import collect_state
          import json

          api = RentMasseurAPI()
          state = collect_state(api)
          print(json.dumps({
            'available_status': state.available_status,
            'availability_seconds_left': state.availability_seconds_left,
            'profile_hidden': state.profile_hidden,
            'views': state.views,
            'contact_clicks': state.contact_clicks,
            'emails': state.emails,
            'search_rank': state.search_rank,
            'measurement_valid': state.measurement_valid,
            'endpoint_errors': state.endpoint_errors,
            'endpoint_error_count': state.endpoint_error_count,
            'state_hash': state.state_hash,
          }, indent=2))
          " || echo "State collection failed"

      - name: Build visitor revisit queue
        env:
          RENTMASSEUR_USER: ${{ secrets.RENTMASSEUR_USER }}
          RENTMASSEUR_PASS: ${{ secrets.RENTMASSEUR_PASS }}
        run: |
          python3 -c "
          from rm_traffic.api_client import RentMasseurAPI
          from rm_traffic.visitor_revisit_engine import build_revisit_queue, write_revisit_queue, format_queue_summary
          api = RentMasseurAPI()
          queue = build_revisit_queue(api)
          filepath = write_revisit_queue(queue)
          print(format_queue_summary(queue))
          print(f'Queue written: {filepath}')
          " || echo "Visitor queue build failed"

      - name: Build demand summary
        env:
          RENTMASSEUR_USER: ${{ secrets.RENTMASSEUR_USER }}
          RENTMASSEUR_PASS: ${{ secrets.RENTMASSEUR_PASS }}
        run: |
          python3 -c "
          from rm_traffic.api_client import RentMasseurAPI
          from rm_traffic.state_engine import collect_state, compute_revenue_pressure
          api = RentMasseurAPI()
          state = collect_state(api)
          pressure = compute_revenue_pressure(state)
          print(f'Revenue pressure: {pressure}')
          " || echo "Demand summary failed"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rm-observe-${{ github.run_id }}
          path: |
            output/
            rm_traffic/receipts/
          retention-days: 30

      - name: Check measurement validity
        if: always()
        run: |
          python3 -c "
          import json, pathlib
          receipts_dir = pathlib.Path('rm_traffic/receipts')
          if receipts_dir.exists():
              for f in receipts_dir.glob('*.json'):
                  data = json.loads(f.read_text())
                  if 'measurement_invalid' in str(data.get('error', '')) or 'measurement_invalid' in str(data.get('reason', '')):
                      print(f'::warning::Measurement invalid detected in {f.name}')
                      # Create issue label for GAG
                      pathlib.Path('rm_traffic/last_failure.json').write_text(json.dumps({
                          'failure_class': '403_measurement_invalid',
                          'source': 'rm-observe',
                          'receipt': f.name,
                          'data': data,
                      }))
          print('Measurement check done')
          "

      - name: Awaken issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let failureData = {};
            try {
              failureData = JSON.parse(fs.readFileSync('rm_traffic/last_failure.json', 'utf8'));
            } catch (e) {}

            const labels = ['gag:measurement-invalid'];
            if (failureData.failure_class === '403_measurement_invalid') {
              labels.push('gag:measurement-invalid');
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[RM-Observe] Measurement invalid — run ${context.runId}`,
              body: `## RM Observe Failure\n\n**Run**: ${context.runId}\n**Failure class**: ${failureData.failure_class || 'unknown'}\n**Receipt**: ${failureData.receipt || 'N/A'}\n\n\`\`\`json\n${JSON.stringify(failureData, null, 2)}\n\`\`\`\n\nGAG should diagnose and propose a repair PR.`,
              labels: labels,
            });
