name: RM BookingOps Ledger

on:
  schedule:
    # Daily at 9:00 AM ET (13:00 UTC) — off-peak, not top-of-hour
    - cron: '5 13 * * *'
  push:
    branches: [main]
    paths:
      - 'booking_ledger.py'
      - 'rm_traffic/booking_ir.py'
      - 'rm_traffic/api_client.py'
      - '.github/workflows/booking-ops.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: true
        default: 'full'
        type: choice
        options:
          - observe
          - qualify
          - draft
          - full

jobs:
  booking-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENTMASSEUR_USER: ${{ secrets.RENTMASSEUR_USER }}
      RENTMASSEUR_PASS: ${{ secrets.RENTMASSEUR_PASS }}
      RM_PHONE: ${{ secrets.RM_PHONE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests 2>/dev/null || true

      - name: Restore booking DB cache
        uses: actions/cache@v4
        with:
          path: data/booking_ops/
          key: booking-ops-${{ github.run_id }}
          restore-keys: |
            booking-ops-

      - name: Run BookingOps pipeline
        id: pipeline
        run: |
          mkdir -p data/booking_ops/reports
          MODE="${{ github.event.inputs.mode || 'full' }}"

          case "$MODE" in
            observe)  python3 booking_ledger.py --observe 2>&1 | tee pipeline_output.txt ;;
            qualify)  python3 booking_ledger.py --qualify 2>&1 | tee pipeline_output.txt ;;
            draft)    python3 booking_ledger.py --draft 2>&1 | tee pipeline_output.txt ;;
            full)     python3 booking_ledger.py --full 2>&1 | tee pipeline_output.txt ;;
          esac

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-ops-${{ github.run_number }}
          path: |
            data/booking_ops/
            pipeline_output.txt

      - name: Commit daily report
        if: success()
        run: |
          git config --global user.name "BookingOps Bot"
          git config --global user.email "actions@github.com"
          git add data/booking_ops/reports/ 2>/dev/null || true
          git add data/booking_ops/booking.db 2>/dev/null || true
          git commit -m "chore: daily booking ops report [skip ci]" 2>/dev/null || true
          git push 2>/dev/null || true

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('pipeline_output.txt', 'utf8'); } catch(e) {}
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 BookingOps Pipeline Failure — ' + new Date().toISOString().split('T')[0],
              body: '## Pipeline Failed\n\n```\n' + output.substring(0, 3000) + '\n```\n\n[View run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')',
              labels: ['booking-ops', 'automated']
            });
